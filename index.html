<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国社区活动地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        /* 通用页面样式 */
        .page {
            display: none;
            min-height: 100vh;
            width: 100%;
            position: relative;
        }

        .active {
            display: block;
        }

        /* 1. 全国地图首页 */
        #homePage {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://picsum.photos/id/1036/1920/1080') center/cover no-repeat;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .auth-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login {
            background-color: rgba(255,255,255,0.9);
            color: #2c3e50;
        }

        .btn-login:hover {
            background-color: #fff;
        }

        .btn-register {
            background-color: #3498db;
            color: #fff;
        }

        .btn-register:hover {
            background-color: #2980b9;
        }

        .btn-logout {
            background-color: #e74c3c;
            color: #fff;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }

        .china-map {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .map-container {
            width: 80%;
            max-width: 1000px;
            position: relative;
        }

        .province {
            position: absolute;
            cursor: pointer;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.3s;
        }

        .province:hover {
            transform: scale(1.1);
            color: #f39c12;
        }

        /* 省份位置（简化版，可根据实际地图调整） */
        .province-beijing { top: 20%; left: 45%; }
        .province-shanghai { top: 30%; left: 55%; }
        .province-guangdong { top: 65%; left: 48%; }
        .province-sichuan { top: 50%; left: 30%; }
        .province-yunnan { top: 65%; left: 25%; }

        /* 2. 省份页面 */
        #provincePage {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://picsum.photos/id/1039/1920/1080') center/cover no-repeat;
        }

        .page-header {
            padding: 20px 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
        }

        .province-title {
            font-size: 32px;
            font-weight: bold;
        }

        .province-map {
            width: 100%;
            height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .city {
            position: absolute;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.3s;
        }

        .city:hover {
            transform: scale(1.1);
            color: #f39c12;
        }

        /* 3. 城市页面 */
        #cityPage {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://picsum.photos/id/1041/1920/1080') center/cover no-repeat;
            padding: 20px 50px;
        }

        .city-title {
            font-size: 32px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .activity-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .activity-card {
            background-color: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .activity-name {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .activity-community {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .activity-location {
            font-size: 15px;
            color: #95a5a6;
            margin-bottom: 15px;
        }

        .activity-people {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            color: #34495e;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #ecf0f1;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #2ecc71;
            transition: width 0.3s;
        }

        /* 4. 活动详情页 */
        #detailPage {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/id/1043/1920/1080') center/cover no-repeat;
            padding: 30px 50px;
        }

        .detail-card {
            background-color: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .detail-title {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .detail-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            font-size: 16px;
            color: #34495e;
        }

        .info-item strong {
            color: #2c3e50;
        }

        .detail-desc {
            font-size: 16px;
            line-height: 1.8;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .btn-signup {
            padding: 15px 40px;
            background-color: #3498db;
            color: #fff;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-signup:hover:not(:disabled) {
            background-color: #2980b9;
        }

        .btn-signup:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        /* 登录/注册弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #fff;
            border-radius: 15px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            color: #34495e;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .modal-btn {
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .modal-btn:hover {
            background-color: #2980b9;
        }

        .switch-text {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .switch-text a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8);
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            z-index: 2000;
            display: none;
        }

        .toast.active {
            display: block;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .logo {
                font-size: 20px;
            }

            .btn {
                padding: 8px 15px;
                font-size: 14px;
            }

            .detail-info {
                grid-template-columns: 1fr;
            }

            .activity-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 1. 全国地图首页 -->
    <div id="homePage" class="page active">
        <div class="header">
            <div class="logo">社区活动地图</div>
            <div class="auth-buttons" id="homeAuth">
                <button class="btn btn-login" id="loginBtn">登录</button>
                <button class="btn btn-register" id="registerBtn">注册</button>
            </div>
        </div>
        <div class="china-map">
            <div class="map-container">
                <!-- 省份点击区域 -->
                <div class="province province-beijing" data-province="北京" data-bg="https://picsum.photos/id/1037/1920/1080">北京</div>
                <div class="province province-shanghai" data-province="上海" data-bg="https://picsum.photos/id/1038/1920/1080">上海</div>
                <div class="province province-guangdong" data-province="广东" data-bg="https://picsum.photos/id/1040/1920/1080">广东</div>
                <div class="province province-sichuan" data-province="四川" data-bg="https://picsum.photos/id/1042/1920/1080">四川</div>
                <div class="province province-yunnan" data-province="云南" data-bg="https://picsum.photos/id/1044/1920/1080">云南</div>
            </div>
        </div>
    </div>

    <!-- 2. 省份页面 -->
    <div id="provincePage" class="page">
        <div class="page-header">
            <div class="back-btn" id="backToHome">←</div>
            <div class="province-title" id="provinceTitle">省份名称</div>
            <div class="auth-buttons" id="provinceAuth">
                <button class="btn btn-login" id="provinceLoginBtn">登录</button>
                <button class="btn btn-register" id="provinceRegisterBtn">注册</button>
            </div>
        </div>
        <div class="province-map" id="provinceMapContainer">
            <!-- 城市点击区域（动态生成） -->
        </div>
    </div>

    <!-- 3. 城市页面 -->
    <div id="cityPage" class="page">
        <div class="page-header">
            <div class="back-btn" id="backToProvince">←</div>
            <div class="city-title" id="cityTitle">城市名称</div>
        </div>
        <div class="activity-list" id="activityList">
            <!-- 活动卡片（动态生成） -->
        </div>
    </div>

    <!-- 4. 活动详情页 -->
    <div id="detailPage" class="page">
        <div class="page-header">
            <div class="back-btn" id="backToCity">←</div>
            <div class="city-title">活动详情</div>
        </div>
        <div class="detail-card">
            <h1 class="detail-title" id="detailTitle">活动名称</h1>
            <div class="detail-info">
                <div class="info-item"><strong>社区名称：</strong><span id="detailCommunity"></span></div>
                <div class="info-item"><strong>活动地点：</strong><span id="detailLocation"></span></div>
                <div class="info-item"><strong>计划报名人数：</strong><span id="detailPlanPeople"></span></div>
                <div class="info-item"><strong>已报名人数：</strong><span id="detailSignedPeople"></span></div>
                <div class="info-item"><strong>活动时间：</strong><span id="detailTime"></span></div>
                <div class="info-item"><strong>联系人：</strong><span id="detailContact"></span></div>
            </div>
            <div class="detail-desc" id="detailDesc">
                活动详细介绍...
            </div>
            <button class="btn-signup" id="signupBtn">立即报名</button>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-close" id="closeLoginModal">×</div>
            <h2 class="modal-title">用户登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="modal-btn" id="confirmLogin">登录</button>
            <div class="switch-text">还没有账号？<a href="#" id="toRegister">立即注册</a></div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <div class="modal-close" id="closeRegisterModal">×</div>
            <h2 class="modal-title">用户注册</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="registerUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="registerConfirmPassword" placeholder="请再次输入密码">
            </div>
            <button class="modal-btn" id="confirmRegister">注册</button>
            <div class="switch-text">已有账号？<a href="#" id="toLogin">立即登录</a></div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== 模拟数据 ====================
        // 省份-城市数据
        const provinceData = {
            "北京": {
                cities: ["北京市"],
                bg: "https://picsum.photos/id/1037/1920/1080"
            },
            "上海": {
                cities: ["上海市"],
                bg: "https://picsum.photos/id/1038/1920/1080"
            },
            "广东": {
                cities: ["广州市", "深圳市", "佛山市"],
                bg: "https://picsum.photos/id/1040/1920/1080"
            },
            "四川": {
                cities: ["成都市", "绵阳市", "德阳市"],
                bg: "https://picsum.photos/id/1042/1920/1080"
            },
            "云南": {
                cities: ["昆明市", "大理市", "丽江市"],
                bg: "https://picsum.photos/id/1044/1920/1080"
            }
        };

        // 活动数据
        const activityData = {
            "北京市": [
                {
                    id: 1,
                    name: "社区邻里节",
                    community: "朝阳社区",
                    location: "朝阳区建国路88号",
                    planPeople: 100,
                    signedPeople: 65,
                    time: "2025-04-10 09:00-17:00",
                    contact: "张老师 138****1234",
                    desc: "为增进邻里感情，举办社区邻里节活动，包含文艺表演、便民服务、亲子互动等环节，欢迎广大居民积极参与！"
                },
                {
                    id: 2,
                    name: "环保公益行",
                    community: "海淀社区",
                    location: "海淀区中关村大街1号",
                    planPeople: 50,
                    signedPeople: 32,
                    time: "2025-04-15 08:30-12:00",
                    contact: "李老师 139****5678",
                    desc: "组织社区居民开展环保公益活动，清理社区周边垃圾，宣传环保知识，共建绿色家园。"
                }
            ],
            "广州市": [
                {
                    id: 3,
                    name: "粤文化体验日",
                    community: "越秀社区",
                    location: "越秀区北京路步行街",
                    planPeople: 80,
                    signedPeople: 45,
                    time: "2025-04-20 10:00-18:00",
                    contact: "陈老师 137****9012",
                    desc: "传承粤文化，举办粤剧表演、广式点心制作、醒狮体验等活动，让居民感受传统文化魅力。"
                }
            ]
        };

        // 用户数据（模拟数据库）
        let users = JSON.parse(localStorage.getItem("communityUsers")) || {};
        let currentUser = localStorage.getItem("currentCommunityUser") || null;

        // ==================== 页面控制 ====================
        const pages = {
            home: document.getElementById("homePage"),
            province: document.getElementById("provincePage"),
            city: document.getElementById("cityPage"),
            detail: document.getElementById("detailPage")
        };

        function showPage(pageName) {
            Object.values(pages).forEach(page => page.classList.remove("active"));
            pages[pageName].classList.add("active");
            updateAuthButtons();
        }

        // ==================== 权限控制 ====================
        function updateAuthButtons() {
            const authContainers = [
                document.getElementById("homeAuth"),
                document.getElementById("provinceAuth")
            ];

            authContainers.forEach(container => {
                if (currentUser) {
                    container.innerHTML = `
                        <span style="color: #fff; font-size: 16px; margin-right: 15px;">欢迎，${currentUser}</span>
                        <button class="btn btn-logout" id="logoutBtn">退出登录</button>
                    `;
                    document.getElementById("logoutBtn").addEventListener("click", logout);
                } else {
                    container.innerHTML = `
                        <button class="btn btn-login">登录</button>
                        <button class="btn btn-register">注册</button>
                    `;
                    container.querySelector(".btn-login").addEventListener("click", () => openModal("login"));
                    container.querySelector(".btn-register").addEventListener("click", () => openModal("register"));
                }
            });

            // 更新报名按钮状态
            const signupBtn = document.getElementById("signupBtn");
            if (signupBtn) {
                signupBtn.disabled = !currentUser;
                signupBtn.textContent = currentUser ? "立即报名" : "请登录后报名";
            }
        }

        // ==================== 登录/注册/登出 ====================
        const modals = {
            login: document.getElementById("loginModal"),
            register: document.getElementById("registerModal")
        };

        function openModal(modalName) {
            Object.values(modals).forEach(modal => modal.classList.remove("active"));
            modals[modalName].classList.add("active");
        }

        function closeAllModals() {
            Object.values(modals).forEach(modal => modal.classList.remove("active"));
        }

        // 关闭弹窗
        document.getElementById("closeLoginModal").addEventListener("click", closeAllModals);
        document.getElementById("closeRegisterModal").addEventListener("click", closeAllModals);
        document.getElementById("toRegister").addEventListener("click", (e) => {
            e.preventDefault();
            openModal("register");
        });
        document.getElementById("toLogin").addEventListener("click", (e) => {
            e.preventDefault();
            openModal("login");
        });

        // 登录
        document.getElementById("confirmLogin").addEventListener("click", () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();

            if (!username || !password) {
                showToast("请输入用户名和密码");
                return;
            }

            if (users[username] && users[username] === password) {
                currentUser = username;
                localStorage.setItem("currentCommunityUser", username);
                closeAllModals();
                showToast("登录成功");
                updateAuthButtons();
                // 清空输入
                document.getElementById("loginUsername").value = "";
                document.getElementById("loginPassword").value = "";
            } else {
                showToast("用户名或密码错误");
            }
        });

        // 注册
        document.getElementById("confirmRegister").addEventListener("click", () => {
            const username = document.getElementById("registerUsername").value.trim();
            const password = document.getElementById("registerPassword").value.trim();
            const confirmPassword = document.getElementById("registerConfirmPassword").value.trim();

            if (!username || !password || !confirmPassword) {
                showToast("请填写完整信息");
                return;
            }

            if (password !== confirmPassword) {
                showToast("两次密码不一致");
                return;
            }

            if (users[username]) {
                showToast("用户名已存在");
                return;
            }

            users[username] = password;
            localStorage.setItem("communityUsers", JSON.stringify(users));
            closeAllModals();
            showToast("注册成功，请登录");
            // 清空输入
            document.getElementById("registerUsername").value = "";
            document.getElementById("registerPassword").value = "";
            document.getElementById("registerConfirmPassword").value = "";
            openModal("login");
        });

        // 登出
        function logout() {
            currentUser = null;
            localStorage.removeItem("currentCommunityUser");
            showToast("已退出登录");
            updateAuthButtons();
        }

        // 提示消息
        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.classList.add("active");
            setTimeout(() => {
                toast.classList.remove("active");
            }, 2000);
        }

        // ==================== 地图交互 ====================
        // 首页省份点击
        document.querySelectorAll(".province").forEach(province => {
            province.addEventListener("click", () => {
                const provinceName = province.dataset.province;
                const bgUrl = province.dataset.bg;

                // 设置省份页
                document.getElementById("provinceTitle").textContent = provinceName;
                document.getElementById("provincePage").style.background = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${bgUrl}') center/cover no-repeat`;

                // 生成城市
                const mapContainer = document.getElementById("provinceMapContainer");
                mapContainer.innerHTML = "";
                const cities = provinceData[provinceName].cities;
                cities.forEach((city, index) => {
                    const cityEl = document.createElement("div");
                    cityEl.className = "city";
                    cityEl.textContent = city;
                    // 简单布局，可根据实际地图调整位置
                    cityEl.style.top = `${30 + index * 20}%`;
                    cityEl.style.left = `${40 + index * 5}%`;
                    cityEl.dataset.city = city;
                    cityEl.dataset.province = provinceName;
                    cityEl.addEventListener("click", () => {
                        // 进入城市页
                        document.getElementById("cityTitle").textContent = city;
                        // 设置城市背景（用省份背景，可单独配置）
                        document.getElementById("cityPage").style.background = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${bgUrl}') center/cover no-repeat`;
                        // 加载活动
                        loadActivities(city);
                        showPage("city");
                    });
                    mapContainer.appendChild(cityEl);
                });

                showPage("province");
            });
        });

        // 返回按钮
        document.getElementById("backToHome").addEventListener("click", () => showPage("home"));
        document.getElementById("backToProvince").addEventListener("click", () => showPage("province"));
        document.getElementById("backToCity").addEventListener("click", () => showPage("city"));

        // ==================== 活动列表 ====================
        function loadActivities(cityName) {
            const listContainer = document.getElementById("activityList");
            listContainer.innerHTML = "";

            const activities = activityData[cityName] || [];
            if (activities.length === 0) {
                listContainer.innerHTML = "<p style='color: #fff; font-size: 20px;'>该城市暂无社区活动</p>";
                return;
            }

            activities.forEach(activity => {
                const card = document.createElement("div");
                card.className = "activity-card";
                card.dataset.activityId = activity.id;
                card.dataset.city = cityName;

                const progress = Math.round((activity.signedPeople / activity.planPeople) * 100);

                card.innerHTML = `
                    <h3 class="activity-name">${activity.name}</h3>
                    <p class="activity-community">${activity.community}</p>
                    <p class="activity-location">📍 ${activity.location}</p>
                    <div class="activity-people">
                        <span>计划：${activity.planPeople}人</span>
                        <span>已报：${activity.signedPeople}人</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                `;

                card.addEventListener("click", () => {
                    // 进入活动详情页
                    loadActivityDetail(activity);
                    showPage("detail");
                });

                listContainer.appendChild(card);
            });
        }

        // ==================== 活动详情 ====================
        function loadActivityDetail(activity) {
            document.getElementById("detailTitle").textContent = activity.name;
            document.getElementById("detailCommunity").textContent = activity.community;
            document.getElementById("detailLocation").textContent = activity.location;
            document.getElementById("detailPlanPeople").textContent = activity.planPeople;
            document.getElementById("detailSignedPeople").textContent = activity.signedPeople;
            document.getElementById("detailTime").textContent = activity.time;
            document.getElementById("detailContact").textContent = activity.contact;
            document.getElementById("detailDesc").textContent = activity.desc;

            // 更新报名按钮
            const signupBtn = document.getElementById("signupBtn");
            signupBtn.disabled = !currentUser;
            signupBtn.textContent = currentUser ? "立即报名" : "请登录后报名";

            // 绑定报名事件
            signupBtn.onclick = () => {
                if (!currentUser) {
                    openModal("login");
                    return;
                }
                // 模拟报名
                activity.signedPeople += 1;
                document.getElementById("detailSignedPeople").textContent = activity.signedPeople;
                // 更新活动列表进度
                loadActivities(activity.city);
                showToast("报名成功！");
            };
        }

        // ==================== 初始化 ====================
        // 绑定首页登录/注册按钮
        document.getElementById("loginBtn").addEventListener("click", () => openModal("login"));
        document.getElementById("registerBtn").addEventListener("click", () => openModal("register"));
        document.getElementById("provinceLoginBtn").addEventListener("click", () => openModal("login"));
        document.getElementById("provinceRegisterBtn").addEventListener("click", () => openModal("register"));

        // 初始化权限按钮
        updateAuthButtons();
    </script>
</body>
</html>
