<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>非遗文化预约系统 - 北京市</title>
<style>
  /* 全局样式重置与基础设定 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  /* 核心国风字体与背景 */
  body {
    font-family: "Microsoft YaHei", "SimSun", serif;
    background: #f7f2e8; /* 仿宣纸底色 */
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 69c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM86 42c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z' fill='%23d9d2c8' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
    color: #2d5f45;
    padding: 20px;
  }

  /* 主容器 */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
  }

  /* 顶部标题栏 */
  .header {
    text-align: center;
    margin-bottom: 15px;
  }

  .header h1 {
    font-size: 36px;
    font-weight: normal;
    margin-bottom: 10px;
  }

  .stats {
    font-size: 16px;
    letter-spacing: 1px;
  }

  .stats span {
    margin: 0 15px;
  }

  /* 地图主体容器 */
  .map-container {
    position: relative;
    width: 100%;
    height: 600px;
    border: 1px solid #2d5f45; /* 仿手绘边框 */
    border-radius: 5px;
    overflow: hidden;
    background: #a8d0b8; /* 地图底色 */
  }

  /* 地图背景图 */
  .map-bg {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.9;
  }

  /* 方位标 N */
  .compass {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 18px;
    font-weight: bold;
  }

  /* 右侧活动列表面板 */
  .activity-panel {
    position: absolute;
    top: 50%;
    right: 30px;
    transform: translateY(-50%);
    width: 280px;
    background: #2d5f45;
    color: white;
    border-radius: 8px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px dashed rgba(255,255,255,0.3);
  }

  .panel-title {
    font-size: 16px;
  }

  .arrow {
    width: 24px;
    height: 24px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .activity-list {
    max-height: 400px;
    overflow-y: auto;
  }

  .activity-item {
    padding: 10px 5px;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
    cursor: pointer;
    transition: background 0.2s;
  }

  .activity-item:hover {
    background: rgba(255,255,255,0.1);
  }

  /* 个人中心入口头像 */
  .user-avatar {
    position: absolute;
    top: 20px;
    right: 30px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #2d5f45;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #2d5f45;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="container">
  <!-- 顶部标题与统计 -->
  <div class="header">
    <h1>北京市</h1>
    <div class="stats">
      <span>◆ 国家5A级景区：9个</span>
      <span>◆ 国家级旅游度假区：1个</span>
      <span>◆ 五星级旅游饭店：57家</span>
    </div>
  </div>

  <!-- 地图主体 -->
  <div class="map-container">
    <!-- 方位标 -->
    <div class="compass">N ▲</div>
    
    <!-- 个人中心头像入口 -->
    <a href="user.html" class="user-avatar">我</a>
    
    <!-- 地图图片：这里替换成你GitHub的北京地图图片 -->
    <img class="map-bg" src="https://picsum.photos/id/1039/1200/600" alt="北京地图">
    
    <!-- 右侧活动列表 -->
    <div class="activity-panel">
      <div class="panel-header">
        <div class="panel-title">非遗活动推荐</div>
        <div class="arrow">></div>
      </div>
      <div class="activity-list">
        <div class="activity-item">颐和园</div>
        <div class="activity-item">八达岭—慕田峪长城旅游区</div>
        <div class="activity-item">天坛公园</div>
        <div class="activity-item">颐和园</div>
        <div class="activity-item">八达岭—慕田峪长城旅游区</div>
      </div>
    </div>
  </div>
</div>

<script>
// 这里可以添加JS交互逻辑，比如点击活动跳转到对应省份详情
const activities = document.querySelectorAll('.activity-item');
activities.forEach(act => {
  act.addEventListener('click', () => {
    // 示例：点击跳转到北京的详情页
    window.location.href = 'province.html?name=北京';
  });
});
</script>
</body>
</html>
  <!-- 管理员后台 -->
  <div class="admin-panel">
    <h3>🔧 管理员后台 - 活动管理</h3>
    <div class="admin-row">
      <input id="actName" placeholder="活动名称" value="非遗体验活动">
      <input id="actPlace" placeholder="举办城市" value="北京">
      <button class="add-btn" onclick="addActivity()">新增活动</button>
    </div>
    <p style="font-size:12px;color:#666">提示：活动城市必须和上方选择的城市一致才能显示</p>
  </div>
</div>

<script>
// 省份坐标
const provinceData = {
  "北京":{x:700,y:220,w:25,h:25,citys:["东城区","西城区","朝阳区","海淀区"]},
  "天津":{x:710,y:240,w:25,h:25,citys:["和平区","河东区"]},
  "河北":{x:670,y:240,w:80,h:80,citys:["石家庄","唐山","秦皇岛"]},
  "山西":{x:630,y:240,w:50,h:70,citys:["太原","大同"]},
  "内蒙古":{x:550,y:150,w:220,h:150,citys:["呼和浩特","包头"]},
  "辽宁":{x:770,y:200,w:70,h:80,citys:["沈阳","大连"]},
  "吉林":{x:800,y:160,w:70,h:70,citys:["长春","吉林"]},
  "黑龙江":{x:830,y:100,w:100,h:100,citys:["哈尔滨","齐齐哈尔"]},
  "上海":{x:870,y:400,w:25,h:25,citys:["黄浦区","浦东新区"]},
  "江苏":{x:820,y:380,w:60,h:50,citys:["南京","苏州"]},
  "浙江":{x:830,y:420,w:50,h:40,citys:["杭州","宁波"]},
  "安徽":{x:790,y:380,w:50,h:50,citys:["合肥","黄山"]},
  "福建":{x:840,y:450,w:40,h:50,citys:["福州","厦门"]},
  "江西":{x:800,y:420,w:40,h:60,citys:["南昌","九江"]},
  "山东":{x:760,y:320,w:70,h:60,citys:["济南","青岛"]},
  "河南":{x:720,y:350,w:60,h:60,citys:["郑州","洛阳"]},
  "湖北":{x:720,y:390,w:60,h:60,citys:["武汉","宜昌"]},
  "湖南":{x:720,y:430,w:50,h:70,citys:["长沙","张家界"]},
  "广东":{x:740,y:490,w:90,h:90,citys:["广州","深圳"]},
  "广西":{x:670,y:480,w:70,h:100,citys:["南宁","桂林"]},
  "海南":{x:760,y:610,w:25,h:40,citys:["海口","三亚"]},
  "重庆":{x:650,y:410,w:40,h:40,citys:["渝中区","万州区"]},
  "四川":{x:570,y:400,w:90,h:120,citys:["成都","绵阳"]},
  "贵州":{x:670,y:440,w:40,h:50,citys:["贵阳","遵义"]},
  "云南":{x:590,y:480,w:70,h:100,citys:["昆明","丽江"]},
  "西藏":{x:420,y:420,w:120,h:140,citys:["拉萨","林芝"]},
  "陕西":{x:660,y:340,w:50,h:60,citys:["西安","延安"]},
  "甘肃":{x:550,y:320,w:100,h:100,citys:["兰州","敦煌"]},
  "青海":{x:470,y:320,w:90,h:120,citys:["西宁"]},
  "宁夏":{x:600,y:280,w:30,h:30,citys:["银川"]},
  "新疆":{x:320,y:200,w:180,h:220,citys:["乌鲁木齐"]},
  "香港":{x:800,y:540,w:12,h:12,citys:["香港"]},
  "澳门":{x:790,y:545,w:10,h:10,citys:["澳门"]},
  "台湾":{x:930,y:490,w:30,h:70,citys:["台北"]}
};

// 生成省份按钮
const pBtns = document.getElementById('provinceBtns');
for(let n in provinceData){
  pBtns.innerHTML+=`<button onclick="showProvince('${n}')">${n}</button>`;
}

let currentProv = '';
let currentCity = '';
const hl = document.getElementById('highlight');

// 显示省份
function showProvince(name){
  currentProv = name;
  currentCity = '';
  let d=provinceData[name];
  hl.style.display='block';
  hl.style.left=d.x+'px';
  hl.style.top=d.y+'px';
  hl.style.width=d.w+'px';
  hl.style.height=d.h+'px';

  // 城市按钮
  let cHtml='';
  d.citys.forEach(c=>{
    cHtml+=`<button onclick="showCity('${c}')">${c}</button>`;
  });
  document.getElementById('cityBtns').innerHTML=cHtml;
  document.getElementById('infoTitle').innerText=`当前：${name}`;
  document.getElementById('infoText').innerText='请选择城市查看活动';
  refreshActivity();
}

// 显示城市
function showCity(city){
  currentCity=city;
  document.getElementById('infoTitle').innerText=`当前：${currentProv} - ${city}`;
  document.getElementById('infoText').innerText=`以下是${city}的旅游/文化活动`;
  refreshActivity();
}

// 活动数据（本地存储）
let activities = JSON.parse(localStorage.getItem('activities')) || [];

// 刷新活动列表
function refreshActivity(){
  let list = document.getElementById('activityList');
  let html='';
  activities.forEach((a,i)=>{
    if(currentCity && a.place===currentCity){
      html+=`
      <div class="activity-item">
        ${a.name}（${a.place}）
        <button class="del-btn" onclick="delAct(${i})">删除</button>
      </div>`;
    }
  });
  list.innerHTML=html || '<p>暂无活动</p>';
}

// 新增活动
function addActivity(){
  let name = document.getElementById('actName').value.trim();
  let place = document.getElementById('actPlace').value.trim();
  if(!name || !place){alert('请填写完整');return;}
  activities.push({name,place});
  localStorage.setItem('activities',JSON.stringify(activities));
  refreshActivity();
}

// 删除活动
function delAct(index){
  if(!confirm('确定删除？'))return;
  activities.splice(index,1);
  localStorage.setItem('activities',JSON.stringify(activities));
  refreshActivity();
}
</script>
</body>
</html>
